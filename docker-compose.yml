services:
  exact-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      EXACT_SERVER_BACKEND: flask
      EXACT_LLM_BASE_URL: ${EXACT_LLM_BASE_URL:-http://host.docker.internal:8001}
      EXACT_LLM_MODEL: ${EXACT_LLM_MODEL:-Qwen3-8B}
      EXACT_MAX_RETRIES: ${EXACT_MAX_RETRIES:-2}
      EXACT_CODE_TIMEOUT: ${EXACT_CODE_TIMEOUT:-4}
      EXACT_QWEN_MODE_HINT: ${EXACT_QWEN_MODE_HINT:-auto}
      EXACT_QWEN_HARD_THINKING_SWITCH: ${EXACT_QWEN_HARD_THINKING_SWITCH:-on}
      EXACT_RETRIEVAL_MODE: ${EXACT_RETRIEVAL_MODE:-auto}
      EXACT_RETRIEVAL_ALLOW_DOWNLOAD: ${EXACT_RETRIEVAL_ALLOW_DOWNLOAD:-false}
    volumes:
      - ./dataset/chromadb_data:/app/exact_pipeline/dataset/chromadb_data
      - ./dataset/graph_data:/app/exact_pipeline/dataset/graph_data
    restart: unless-stopped
